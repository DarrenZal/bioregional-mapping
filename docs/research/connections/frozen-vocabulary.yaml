# Frozen vocabulary for bioregional-mapping bridge-note `concepts:` field.
# Per Spore intake protocol §2a. Entries here define the closed set that
# bridge-note `concepts:` lists may reference. Adding new concepts requires
# unfreezing, vocabulary review, and re-freezing — not silent extension.
#
# status: frozen
# date: 2026-05-04
# protocol: spore.docs.research.planning.learning-field-intake-protocol-v1 §2a

# --- Core mapping-practice concepts ---
- slug: layer
  description: A mapping-practice layer (relational, cultural, ecological, economic, governance, geospatial); one of six headings in the multi-layer rubric.
- slug: story-of-place
  description: The persistent narrative + artifact set generated by a bioregional mapping process; per RC Phase 2 §1, the central output and Field manifestation.
- slug: warm-data
  description: Relational / stakeholder data (trust networks, attendance histories, who-knows-whom); the relational layer's primary content type.
- slug: sovereign-territory
  description: Indigenous-governed territory; cultural-layer artifact subject to FPIC and Indigenous-led data governance.
- slug: watershed
  description: Hydrological holon at sub-watershed → watershed → coastal-zone → ecoregion scales; ecological-layer geographic primitive.
- slug: workshop
  description: A bioregional mapping workshop — multi-stakeholder convening that operationalizes mapping practice; instance of joint-commitment.
- slug: field-guide
  description: A training-the-trainers manual (e.g., RC Bioregional Mapping Field Guide) that transmits methodology across cohorts; reproduction-continuity artifact.
- slug: facilitation
  description: Workshop convening labor; care + maintenance + translation labour at the workshop layer (per spore.maintenance-economics).
- slug: documentation
  description: Workshop artifact capture (photos, flipcharts, evaluation forms, narrative pieces); raw material for Story of Place and downstream regeneration strategies.

# --- Spore + bioregional-coordination upstream primitives ---
- slug: field
  description: Spore primitive — coordination substrate with rule-stack (operational/collective-choice/constitutional layers per spore:ADR-0046). Story of Place is a Field manifestation.
- slug: holon
  description: Spore primitive — irreducible coordination unit. Bioregional holons nest (sub-watershed → watershed → ecoregion).
- slug: membrane
  description: Spore primitive — permeable boundary with self-produced or text-authoritative production-mode (spore:ADR-0062, ADR-0053). Mapping layers as membranes.
- slug: joint-commitment
  description: Spore primitive — multi-party-simultaneous commitment (spore:ADR-0050). Workshop-as-Joint-Commitment is paradigm-case.
- slug: reproduction
  description: Spore primitive — continuity mechanism (spore:ADR-0049). Field Guide as Reproduction artifact.
- slug: evidence
  description: Spore verb — claim-supporting artifact. Mapping outputs become evidence for downstream claims (entity resolution, commitments, regeneration strategy).
- slug: signal
  description: Spore primitive — perception input across a membrane.
- slug: intent
  description: Spore primitive — directional motivation surfacing in commitments.
- slug: commitment
  description: Spore primitive (basic, non-joint form). Mapping outputs surface commitments at the economic layer; flow into BKC's CommitmentPool patterns.

# --- Stewardship + governance concepts ---
- slug: stewardship
  description: Long-horizon care relationship to a place; load-bearing for generational-time mapping work and intergenerational-handoff machinery.
- slug: consent
  description: Free, prior, informed consent (FPIC); load-bearing at cultural layer for Indigenous-knowledge intake.
- slug: traditional-ecological-knowledge
  description: TEK; load-bearing knowledge body at cultural + ecological layer intersections; transmitted through generational practice.
- slug: ceremony
  description: Practice form at cultural layer that gates certain forms of knowledge transmission and witnessing.
- slug: rights-of-nature
  description: Governance-layer doctrine; ecosystems as legal persons (per Speak-for-the-Trees and adjacent practitioner work).

# --- Practitioner / field concepts ---
- slug: practitioner
  description: A person doing bioregional mapping work in the field (Cultivator, Steward, facilitator, Indigenous knowledge holder, GIS analyst, etc.).
- slug: bioregion
  description: Place-attached coordination scope (Salish Sea, Cascadia, Sierra Nevada de Santa Marta, etc.). Load-bearing per spore.positioning.agentic-bioregionalism.
- slug: tooling-map
  description: An index of mapping tools and their layer-coverage (QGIS, Felt, regenatlas, Kumu, Restor, etc.); bridge-note artifact form for the external tooling ecosystem.
- slug: indigenous-led-governance
  description: Governance by Indigenous nations and protocols, prior to and across colonial jurisdictions. Per BioKulture engineering frame.
